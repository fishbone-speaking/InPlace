.tab-inactive { border-bottom: 2px solid transparent; color: #9CA3AF; } .tab-inactive:hover { color: #4B5563; }
.tag { @apply inline-flex items-center px-3 py-1 rounded-full text-xs font-medium; }
.scrollbar-hide::-webkit-scrollbar { display: none; } .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
.map-tiles { filter: saturate(0.8) contrast(1.05); }
@keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(2); opacity: 0; } }
.pulse-ring::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: inherit; animation: pulse-ring 2s ease-out infinite; z-index: -1; }
.route-line { stroke-dasharray: 10; animation: dash 30s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -1000; } }
}

<body class="h-screen w-screen overflow-hidden bg-gray-900">
<div id="map" class="absolute inset-0 z-0"></div>
<div class="absolute top-0 left-0 right-0 z-20 p-4">
<div class="glass rounded-2xl shadow-lg max-w-2xl mx-auto flex items-center gap-3 px-4 py-3">
<div class="serif text-xl font-bold text-gray-800 tracking-wide">在地</div>
<div class="h-6 w-px bg-gray-300"></div>
<div class="flex-1 relative">

<input type="text" placeholder="搜索地点、书名、电影..." class="w-full bg-gray-100 rounded-xl py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 transition-all" id="searchInput" oninput="searchGeocode(this.value)" onfocus="showSearchResultsIfAny()">

</div>
<button onclick="locateMe()" class="p-2 hover:bg-gray-100 rounded-xl transition-colors" title="定位到我"><svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg></button>
</div>
</div>
<div class="absolute top-20 left-0 right-0 z-20 flex justify-center gap-2 px-4">
<button onclick="filterType('all')" class="filter-btn glass px-4 py-2 rounded-full text-sm font-medium shadow-md transition-all hover:scale-105 active" data-type="all"><span class="w-2 h-2 rounded-full bg-gray-800 inline-block mr-1"></span>全部</button>
<button onclick="filterType('book')" class="filter-btn glass px-4 py-2 rounded-full text-sm font-medium shadow-md transition-all hover:scale-105" data-type="book"><span class="w-2 h-2 rounded-full bg-purple-500 inline-block mr-1"></span>书籍</button>
<button onclick="filterType('film')" class="filter-btn glass px-4 py-2 rounded-full text-sm font-medium shadow-md transition-all hover:scale-105" data-type="film"><span class="w-2 h-2 rounded-full bg-amber-500 inline-block mr-1"></span>电影</button>

<button onclick="filterType('user')" class="filter-btn glass px-4 py-2 rounded-full text-sm font-medium shadow-md transition-all hover:scale-105" data-type="user"><span class="w-2 h-2 rounded-full bg-emerald-500 inline-block mr-1"></span>我的记录</button>
</div>
<div id="detailPanel" class="absolute top-20 right-4 bottom-4 w-96 glass rounded-2xl shadow-2xl z-30 panel-slide transform translate-x-[calc(100%+2rem)] flex flex-col overflow-hidden max-h-[calc(100vh-6rem)]">
<div class="relative h-48 shrink-0"><img id="detailImage" src="" alt="" class="w-full h-full object-cover"><div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div><button onclick="closePanel()" class="absolute top-3 right-3 w-8 h-8 bg-white/20 backdrop-blur rounded-full flex items-center justify-center text-white hover:bg-white/40 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button><div class="absolute bottom-4 left-4 right-4"><span id="detailType" class="tag bg-white/20 text-white backdrop-blur mb-2"></span><h2 id="detailTitle" class="serif text-2xl font-bold text-white leading-tight"></h2><p id="detailCreator" class="text-white/80 text-sm mt-1"></p></div></div>
<div class="flex-1 overflow-y-auto scrollbar-hide p-5">
<div class="flex gap-4 mb-4 border-b border-gray-200"><button onclick="switchTab('info')" class="tab-btn pb-2 tab-active" data-tab="info">信息</button><button onclick="switchTab('stories')" class="tab-btn pb-2 tab-inactive" data-tab="stories">地点故事</button><button onclick="switchTab('nearby')" class="tab-btn pb-2 tab-inactive" data-tab="nearby">附近</button></div>
<div id="tabInfo" class="tab-content"><div class="mb-4"><h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">关联地点</h3><p id="detailLocation" class="text-gray-800 font-medium"></p><p id="detailAddress" class="text-gray-500 text-sm mt-1"></p></div><div class="mb-4"><h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">简介</h3><p id="detailDesc" class="text-gray-600 text-sm leading-relaxed"></p></div><div class="mb-4"><h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">关联类型</h3><div id="detailTags" class="flex flex-wrap gap-2 mt-1"></div></div><div class="mb-4"><h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">评分</h3><div class="flex items-center gap-2"><span id="detailRating" class="text-2xl font-bold text-amber-500"></span><span class="text-sm text-gray-400">/ 10</span></div></div></div>

</div>
<div class="p-4 border-t border-gray-200 shrink-0 bg-white/50"><button onclick="openAddModalFromDetail()" class="w-full bg-gray-900 text-white py-3 rounded-xl font-medium hover:bg-gray-800 transition flex items-center justify-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>在这里打卡记录</button></div>
</div>
<div class="absolute bottom-6 left-6 z-20 flex flex-col gap-3">

<button onclick="toggleMyTracks()" class="w-14 h-14 glass rounded-full shadow-xl flex items-center justify-center hover:scale-110 transition-transform hover:shadow-2xl text-gray-800"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0121 18.382V7.618a1 1 0 01-.553-.894L15 7m0 13V7"/></svg></button>
</div>
<div id="tracksPanel" class="absolute top-20 left-4 bottom-4 w-80 glass rounded-2xl shadow-2xl z-30 panel-slide transform -translate-x-[calc(100%+2rem)] flex flex-col overflow-hidden">
<div class="p-5 border-b border-gray-200"><div class="flex items-center justify-between"><h2 class="serif text-xl font-bold text-gray-800">我的足迹</h2><button onclick="toggleMyTracks()" class="w-8 h-8 hover:bg-gray-100 rounded-full flex items-center justify-center transition"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div><p class="text-sm text-gray-500 mt-1">已标记 <span id="trackCount" class="font-bold text-gray-800">0</span> 个地点</p></div>

<div class="mb-3"><div class="bg-gray-50 rounded-xl p-3 flex items-center gap-3"><svg class="w-5 h-5 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg><div class="min-w-0"><p id="addLocationName" class="font-medium text-sm text-gray-800 truncate">尚未选择位置</p><p id="addLocationSub" class="text-xs text-gray-400">点击地图或现有标记</p></div><button onclick="setAddLocationCurrent()" class="ml-auto text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded-lg hover:bg-gray-300 transition whitespace-nowrap">当前位置</button></div></div>
<div class="mb-3"><label class="block text-xs font-medium text-gray-500 mb-1.5 uppercase tracking-wide">类型</label><div class="flex gap-2"><button onclick="setAddType('book')" class="add-type-btn flex-1 py-2 rounded-xl border-2 border-gray-200 text-center text-xs font-medium hover:border-purple-500 hover:text-purple-600 transition" data-add-type="book"><div class="text-xl mb-0.5">📖</div>书籍</button><button onclick="setAddType('film')" class="add-type-btn flex-1 py-2 rounded-xl border-2 border-gray-200 text-center text-xs font-medium hover:border-amber-500 hover:text-amber-600 transition" data-add-type="film"><div class="text-xl mb-0.5">🎬</div>电影</button><button onclick="setAddType('music')" class="add-type-btn flex-1 py-2 rounded-xl border-2 border-gray-200 text-center text-xs font-medium hover:border-pink-500 hover:text-pink-600 transition" data-add-type="music"><div class="text-xl mb-0.5">🎵</div>音乐</button></div></div>
<div class="mb-3"><label class="block text-xs font-medium text-gray-500 mb-1.5 uppercase tracking-wide">名称</label><input type="text" id="addTitle" placeholder="书名、电影名、歌曲名..." class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent" oninput="searchAddSuggestions()"><div id="addSuggestions" class="mt-1 bg-white border border-gray-200 rounded-xl shadow-lg hidden max-h-40 overflow-y-auto"></div></div>
<div class="mb-3"><label class="block text-xs font-medium text-gray-500 mb-1.5 uppercase tracking-wide">关联理由</label><div class="flex flex-wrap gap-1.5"><button onclick="setAddTag('取景地')" class="add-tag-btn px-2.5 py-1 rounded-full text-xs border border-gray-200 hover:bg-gray-100 transition" data-tag="取景地">取景地</button><button onclick="setAddTag('故事背景')" class="add-tag-btn px-2.5 py-1 rounded-full text-xs border border-gray-200 hover:bg-gray-100 transition" data-tag="故事背景">故事背景</button><button onclick="setAddTag('创作地')" class="add-tag-btn px-2.5 py-1 rounded-full text-xs border border-gray-200 hover:bg-gray-100 transition" data-tag="创作地">创作地</button><button onclick="setAddTag('在这里读的')" class="add-tag-btn px-2.5 py-1 rounded-full text-xs border border-gray-200 hover:bg-gray-100 transition" data-tag="在这里读的">在这里读的</button><button onclick="setAddTag('粉丝打卡')" class="add-tag-btn px-2.5 py-1 rounded-full text-xs border border-gray-200 hover:bg-gray-100 transition" data-tag="粉丝打卡">粉丝打卡</button><button onclick="setAddTag('其他')" class="add-tag-btn px-2.5 py-1 rounded-full text-xs border border-gray-200 hover:bg-gray-100 transition" data-tag="其他">其他</button></div></div>
<div class="mb-3"><label class="block text-xs font-medium text-gray-500 mb-1.5 uppercase tracking-wide">个人感悟</label><textarea id="addNote" rows="2" placeholder="在这个地方，我和这本书/电影的故事..." class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent resize-none"></textarea></div>
</div>
<div class="p-4 border-t border-gray-200 shrink-0"><button onclick="submitAdd()" class="w-full bg-gray-900 text-white py-2.5 rounded-xl font-medium hover:bg-gray-800 transition text-sm">发布记录</button></div>
</div>

<script>
const demoData=[

{id:3,type:'film',title:'真爱至上',creator:'理查德·柯蒂斯 · 2003',location:[51.5113,-0.2056],locationName:'伦敦 诺丁山',address:'伦敦 诺丁山 Portobello Road 一带',desc:'全英国圣诞节的必修课。诺丁山的蓝色门、书店、Portobello Road的周末集市，都是这部电影的标志性场景。',rating:'8.6',image:'https://image.tmdb.org/t/p/w500/1ODdRtgbgkvW4OibGY6yrw1t1D5.jpg',tags:['取景地','浪漫'],relation:'取景地',stories:[{user:'浪漫主义者',text:'去诺丁山的那扇蓝色门，虽然已经不是电影里的那扇了，但氛围还在。',time:'1周前'},{user:'影迷',text:'Portobello Road的周末集市，太有电影感了。',time:'2周前'}]},

let map,markers=[],userMarkers=[],currentFilter='all',selectedAddLocation=null,selectedAddType=null,selectedAddTags=[],routeLine=null,userTracks=[],tempMarker=null;

function initMap(){map=L.map('map',{zoomControl:false,attributionControl:false}).setView([35,105],4);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,className:'map-tiles'}).addTo(map);L.control.zoom({position:'bottomright'}).addTo(map);demoData.forEach(item=>addMarker(item));map.on('click',e=>{if(document.getElementById('addModal').classList.contains('hidden'))return;if(tempMarker)map.removeLayer(tempMarker);tempMarker=L.marker(e.latlng,{icon:L.divIcon({className:'custom-marker marker-user pulse-ring',html:'<span class="icon">📍</span>',iconSize:[40,40],iconAnchor:[20,40]})}).addTo(map);selectedAddLocation={lat:e.latlng.lat,lng:e.latlng.lng,name:'自定义位置'};document.getElementById('addLocationName').textContent=`${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;document.getElementById('addLocationSub').textContent='点击地图其他位置可更换';document.getElementById('addStatusText').textContent='✅ 已选择位置';});}

function addMarker(item){const iconMap={book:'📖',film:'🎬',music:'🎵',user:'✏️'},colorMap={book:'marker-book',film:'marker-film',music:'marker-music',user:'marker-user'};const marker=L.marker(item.location,{icon:L.divIcon({className:`custom-marker ${colorMap[item.type]}`,html:`<span class="icon">${iconMap[item.type]}</span>`,iconSize:[40,40],iconAnchor:[20,40]})}).addTo(map);marker.itemData=item;marker.on('click',e=>{if(!document.getElementById('addModal').classList.contains('hidden')){selectedAddLocation={lat:item.location[0],lng:item.location[1],name:item.locationName};if(tempMarker)map.removeLayer(tempMarker);tempMarker=L.marker(item.location,{icon:L.divIcon({className:'custom-marker marker-user pulse-ring',html:'<span class="icon">✓</span>',iconSize:[40,40],iconAnchor:[20,40]})}).addTo(map);document.getElementById('addLocationName').textContent=item.locationName;document.getElementById('addLocationSub').textContent=item.address;document.getElementById('addStatusText').textContent='✅ 已选择位置';showToast(`已选择位置：${item.locationName}`);L.DomEvent.stopPropagation(e);return;}openDetail(item);});markers.push(marker);}

function addUserMarker(item){addMarker(item);userMarkers.push(item);updateTracksList();}

function filterType(type){currentFilter=type;document.querySelectorAll('.filter-btn').forEach(btn=>{if(btn.dataset.type===type){btn.classList.add('bg-gray-900','text-white');btn.classList.remove('glass');btn.querySelector('span').classList.add('bg-white');if(type==='all')btn.querySelector('span').classList.remove('bg-gray-800');}else{btn.classList.remove('bg-gray-900','text-white');btn.classList.add('glass');btn.querySelector('span').classList.remove('bg-white');if(btn.dataset.type==='all')btn.querySelector('span').classList.add('bg-gray-800');}});markers.forEach(marker=>{const data=marker.itemData;if(type==='all'||data.type===type||(type==='user'&&data.isUser)){map.addLayer(marker);}else{map.removeLayer(marker);}});showToast(type==='all'?'显示全部':`筛选: ${type==='book'?'书籍':type==='film'?'电影':type==='music'?'音乐':'我的记录'}`);}

function openDetail(item){const panel=document.getElementById('detailPanel');document.getElementById('detailImage').src=item.image;document.getElementById('detailType').textContent=item.type==='book'?'书籍':item.type==='film'?'电影':'音乐';document.getElementById('detailTitle').textContent=item.title;document.getElementById('detailCreator').textContent=item.creator;document.getElementById('detailLocation').textContent=item.locationName;document.getElementById('detailAddress').textContent=item.address;document.getElementById('detailDesc').textContent=item.desc;document.getElementById('detailRating').textContent=item.rating;document.getElementById('detailTags').innerHTML=item.tags.map(tag=>`<span class="tag bg-gray-100 text-gray-700">${tag}</span>`).join('');document.getElementById('storiesList').innerHTML=item.stories.map(story=>`<div class="bg-gray-50 rounded-xl p-4"><div class="flex items-center gap-2 mb-2"><div class="w-7 h-7 bg-gray-800 rounded-full flex items-center justify-center text-white text-xs font-bold">${story.user[0]}</div><span class="font-medium text-sm text-gray-800">${story.user}</span><span class="text-xs text-gray-400 ml-auto">${story.time}</span></div><p class="text-sm text-gray-600 leading-relaxed">${story.text}</p></div>`).join('');const nearby=demoData.filter(d=>d.id!==item.id).slice(0,3);document.getElementById('nearbyList').innerHTML=nearby.map(d=>`<div class="flex gap-3 bg-gray-50 rounded-xl p-3 cursor-pointer hover:bg-gray-100 transition" onclick="openDetailById(${d.id})"><img src="${d.image}" class="w-16 h-16 rounded-lg object-cover shrink-0"><div><h4 class="font-medium text-sm text-gray-800">${d.title}</h4><p class="text-xs text-gray-500 mt-1">${d.locationName}</p><span class="tag bg-purple-100 text-purple-700 mt-1">${d.type==='book'?'书籍':d.type==='film'?'电影':'音乐'}</span></div></div>`).join('');switchTab('info');panel.classList.remove('translate-x-[calc(100%+2rem)]');map.flyTo(item.location,12,{duration:1.5});}

function openDetailById(id){const item=demoData.find(d=>d.id===id);if(item)openDetail(item);}
function closePanel(){document.getElementById('detailPanel').classList.add('translate-x-[calc(100%+2rem)]');}
function switchTab(tab){document.querySelectorAll('.tab-btn').forEach(btn=>{if(btn.dataset.tab===tab){btn.classList.remove('tab-inactive');btn.classList.add('tab-active');}else{btn.classList.remove('tab-active');btn.classList.add('tab-inactive');}});document.querySelectorAll('.tab-content').forEach(content=>content.classList.add('hidden'));document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.remove('hidden');}

function openAddModal(){selectedAddLocation=null;selectedAddType=null;selectedAddTags=[];document.getElementById('addTitle').value='';document.getElementById('addNote').value='';document.getElementById('addLocationName').textContent='尚未选择位置';document.getElementById('addLocationSub').textContent='点击地图或现有标记';document.getElementById('addStatusText').textContent='🖱️ 请在地图上点击选择位置';document.getElementById('addSuggestions').classList.add('hidden');document.querySelectorAll('.add-type-btn').forEach(btn=>{btn.classList.remove('border-purple-500','text-purple-600','border-amber-500','text-amber-600','border-pink-500','text-pink-600');btn.classList.add('border-gray-200');});document.querySelectorAll('.add-tag-btn').forEach(btn=>{btn.classList.remove('bg-gray-900','text-white','border-gray-900');btn.classList.add('border-gray-200');});document.getElementById('addModal').classList.remove('hidden');}
function openAddModalFromDetail(){const title=document.getElementById('detailTitle').textContent;const type=document.getElementById('detailType').textContent==='书籍'?'book':document.getElementById('detailType').textContent==='电影'?'film':'music';openAddModal();document.getElementById('addTitle').value=title;setAddType(type);}
function closeAddModal(){document.getElementById('addModal').classList.add('hidden');if(tempMarker){map.removeLayer(tempMarker);tempMarker=null;}}
function setAddLocationCurrent(){selectedAddLocation={lat:39.9042,lng:116.4074,name:'当前位置（北京）'};document.getElementById('addLocationName').textContent='当前位置（北京）';document.getElementById('addLocationSub').textContent='已自动定位';if(tempMarker)map.removeLayer(tempMarker);tempMarker=L.marker([39.9042,116.4074],{icon:L.divIcon({className:'custom-marker marker-user pulse-ring',html:'<span class="icon">📍</span>',iconSize:[40,40],iconAnchor:[20,40]})}).addTo(map);map.flyTo([39.9042,116.4074],12);}
function setAddType(type){selectedAddType=type;document.querySelectorAll('.add-type-btn').forEach(btn=>{const btnType=btn.dataset.addType;if(btnType===type){btn.classList.remove('border-gray-200');if(type==='book')btn.classList.add('border-purple-500','text-purple-600');if(type==='film')btn.classList.add('border-amber-500','text-amber-600');if(type==='music')btn.classList.add('border-pink-500','text-pink-600');}else{btn.classList.remove('border-purple-500','text-purple-600','border-amber-500','text-amber-600','border-pink-500','text-pink-600');btn.classList.add('border-gray-200');}});}
function setAddTag(tag){const btn=document.querySelector(`[data-tag="${tag}"]`);if(selectedAddTags.includes(tag)){selectedAddTags=selectedAddTags.filter(t=>t!==tag);btn.classList.remove('bg-gray-900','text-white','border-gray-900');btn.classList.add('border-gray-200');}else{selectedAddTags.push(tag);btn.classList.remove('border-gray-200');btn.classList.add('bg-gray-900','text-white','border-gray-900');}}
function searchAddSuggestions(){const query=document.getElementById('addTitle').value.toLowerCase();const container=document.getElementById('addSuggestions');if(!query){container.classList.add('hidden');return;}const matches=suggestionLibrary.filter(s=>s.title.toLowerCase().includes(query)).slice(0,5);if(matches.length===0){container.classList.add('hidden');return;}const typeMap={book:'书籍',film:'电影',music:'音乐'};container.innerHTML=matches.map(m=>`<div class="px-4 py-3 hover:bg-gray-50 cursor-pointer flex items-center justify-between" onclick="selectSuggestion('${m.title}', '${m.type}')"><div><div class="font-medium text-sm text-gray-800">${m.title}</div><div class="text-xs text-gray-400">${m.creator}</div></div><span class="tag bg-gray-100 text-gray-600">${typeMap[m.type]}</span></div>`).join('');container.classList.remove('hidden');}
function selectSuggestion(title,type){document.getElementById('addTitle').value=title;setAddType(type);document.getElementById('addSuggestions').classList.add('hidden');}
function submitAdd(){const title=document.getElementById('addTitle').value;const note=document.getElementById('addNote').value;if(!title||!selectedAddLocation||!selectedAddType){showToast('请填写完整信息');return;}const newItem={id:Date.now(),type:selectedAddType,title:title,creator:'我的记录',location:[selectedAddLocation.lat,selectedAddLocation.lng],locationName:selectedAddLocation.name||'自定义位置',address:note||'用户标记地点',desc:note||'用户添加的记录',rating:'-',image:`https://picsum.photos/seed/${Date.now()}/600/400`,tags:selectedAddTags.length?selectedAddTags:['用户记录'],relation:selectedAddTags[0]||'用户记录',stories:[],isUser:true};addUserMarker(newItem);userTracks.push(newItem);closeAddModal();showToast('记录已添加！');filterType('user');}
function toggleMyTracks(){const panel=document.getElementById('tracksPanel');const isOpen=!panel.classList.contains('-translate-x-[calc(100%+2rem)]');if(isOpen){panel.classList.add('-translate-x-[calc(100%+2rem)]');}else{panel.classList.remove('-translate-x-[calc(100%+2rem)]');updateTracksList();}}
function updateTracksList(){document.getElementById('trackCount').textContent=userTracks.length;const container=document.getElementById('tracksList');if(userTracks.length===0){container.innerHTML=`<div class="text-center py-8"><div class="text-4xl mb-3">🗺️</div><p class="text-gray-500 text-sm">还没有标记任何地点</p><p class="text-gray-400 text-xs mt-1">点击右下角 + 按钮开始记录</p></div>`;return;}const typeMap={book:'书籍',film:'电影',music:'音乐'};const colorMap={book:'bg-purple-100 text-purple-700',film:'bg-amber-100 text-amber-700',music:'bg-pink-100 text-pink-700'};container.innerHTML=userTracks.map(track=>`<div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition" onclick="openDetailById(${track.id}); map.flyTo([${track.location[0]}, ${track.location[1]}], 14)"><div class="flex items-start gap-3"><div class="w-10 h-10 rounded-xl ${track.type==='book'?'bg-purple-100':track.type==='film'?'bg-amber-100':'bg-pink-100'} flex items-center justify-center text-lg shrink-0">${track.type==='book'?'📖':track.type==='film'?'🎬':'🎵'}</div><div class="flex-1 min-w-0"><h4 class="font-medium text-sm text-gray-800 truncate">${track.title}</h4><p class="text-xs text-gray-500 mt-1">${track.locationName}</p><div class="flex items-center gap-2 mt-2"><span class="tag ${colorMap[track.type]}">${typeMap[track.type]}</span>${track.tags.map(t=>`<span class="tag bg-gray-100 text-gray-600">${t}</span>`).join('')}</div></div></div></div>`).join('');}
function generateRoute(){if(userTracks.length<2){showToast('至少需要2个标记才能生成路线');return;}if(routeLine)map.removeLayer(routeLine);const latlngs=userTracks.map(t=>t.location);routeLine=L.polyline(latlngs,{color:'#F59E0B',weight:4,opacity:0.8,dashArray:'10, 10',className:'route-line'}).addTo(map);map.fitBounds(routeLine.getBounds(),{padding:[50,50]});showToast('已生成你的文化朝圣路线！');toggleMyTracks();}
function locateMe(){map.flyTo([39.9042,116.4074],12,{duration:1.5});showToast('已定位到北京（演示模式）');}
function showToast(text){const toast=document.getElementById('toast');document.getElementById('toastText').textContent=text;toast.classList.remove('translate-y-20','opacity-0');setTimeout(()=>{toast.classList.add('translate-y-20','opacity-0');},2500);}

let searchTimeout,lastSearchResults=[];
function searchGeocode(query){clearTimeout(searchTimeout);const container=document.getElementById('searchResults');if(!query||query.trim().length<2){container.classList.add('hidden');return;}searchTimeout=setTimeout(async()=>{const q=query.trim();const results=[];const localMatches=demoData.filter(d=>d.title.toLowerCase().includes(q.toLowerCase())||d.locationName.toLowerCase().includes(q.toLowerCase())||d.creator.toLowerCase().includes(q.toLowerCase())).slice(0,4);if(localMatches.length>0){results.push({type:'section',label:'📚 书影音'});localMatches.forEach(d=>{results.push({type:'local',id:d.id,title:d.title,subtitle:`${d.creator} · ${d.locationName}`,icon:d.type==='book'?'📖':d.type==='film'?'🎬':'🎵',location:d.location});});}try{const response=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&accept-language=zh`,{headers:{'User-Agent':'BookMapDemo/1.0'}});const data=await response.json();if(data&&data.length>0){results.push({type:'section',label:'📍 地点'});data.forEach(place=>{results.push({type:'place',title:place.display_name.split(',')[0],subtitle:place.display_name,lat:parseFloat(place.lat),lon:parseFloat(place.lon),icon:'📍'});});}}catch(err){console.log('Geocode error:',err);}lastSearchResults=results;renderSearchResults(results);},400);}
function renderSearchResults(results){const container=document.getElementById('searchResults');if(results.length===0){container.innerHTML='<div class="px-4 py-3 text-sm text-gray-400">未找到结果</div>';container.classList.remove('hidden');return;}container.innerHTML=results.map(r=>{if(r.type==='section')return`<div class="px-4 py-2 text-xs font-bold text-gray-400 uppercase tracking-wider border-t border-gray-100 first:border-0">${r.label}</div>`;if(r.type==='local')return`<div class="px-4 py-3 hover:bg-gray-50 cursor-pointer flex items-center gap-3" onclick="handleSearchResult('local', ${r.id})"><div class="w-9 h-9 rounded-xl bg-gray-100 flex items-center justify-center text-lg shrink-0">${r.icon}</div><div class="min-w-0"><div class="font-medium text-sm text-gray-800 truncate">${r.title}</div><div class="text-xs text-gray-400 truncate">${r.subtitle}</div></div></div>`;return`<div class="px-4 py-3 hover:bg-gray-50 cursor-pointer flex items-center gap-3" onclick="handleSearchResult('place', ${r.lat}, ${r.lon}, '${r.title.replace(/'/g,"\\'")}')"><div class="w-9 h-9 rounded-xl bg-gray-100 flex items-center justify-center text-lg shrink-0">${r.icon}</div><div class="min-w-0"><div class="font-medium text-sm text-gray-800 truncate">${r.title}</div><div class="text-xs text-gray-400 truncate">${r.subtitle}</div></div></div>`;}).join('');container.classList.remove('hidden');}
function showSearchResultsIfAny(){if(lastSearchResults.length>0){document.getElementById('searchResults').classList.remove('hidden');}}
function handleSearchResult(type,...args){document.getElementById('searchResults').classList.add('hidden');document.getElementById('searchInput').value='';if(type==='local'){const id=args[0];const item=demoData.find(d=>d.id===id);if(item){if(!document.getElementById('addModal').classList.contains('hidden')){selectedAddLocation={lat:item.location[0],lng:item.location[1],name:item.locationName};if(tempMarker)map.removeLayer(tempMarker);tempMarker=L.marker(item.location,{icon:L.divIcon({className:'custom-marker marker-user pulse-ring',html:'<span class="icon">✓</span>',iconSize:[40,40],iconAnchor:[20,40]})}).addTo(map);document.getElementById('addLocationName').textContent=item.locationName;document.getElementById('addLocationSub').textContent=item.address;document.getElementById('addStatusText').textContent='✅ 已选择位置';showToast(`已选择位置：${item.locationName}`);map.flyTo(item.location,12);}else{openDetail(item);}}}else{const[lat,lon,name]=args;const location=[lat,lon];if(!document.getElementById('addModal').classList.contains('hidden')){selectedAddLocation={lat,lng:lon,name};if(tempMarker)map.removeLayer(tempMarker);tempMarker=L.marker(location,{icon:L.divIcon({className:'custom-marker marker-user pulse-ring',html:'<span class="icon">📍</span>',iconSize:[40,40],iconAnchor:[20,40]})}).addTo(map);document.getElementById('addLocationName').textContent=name;document.getElementById('addLocationSub').textContent=`${lat.toFixed(4)}, ${lon.toFixed(4)}`;document.getElementById('addStatusText').textContent='✅ 已选择位置';showToast(`已选择位置：${name}`);}else{showToast(`已定位到：${name}`);}map.flyTo(location,12);}}
document.addEventListener('click',e=>{const searchBox=document.querySelector('.glass');const results=document.getElementById('searchResults');if(results&&!results.classList.contains('hidden')){if(!searchBox.contains(e.target)){results.classList.add('hidden');}}});
document.getElementById('searchInput').addEventListener('keydown',e=>{const results=document.getElementById('searchResults');if(e.key==='Escape'){results.classList.add('hidden');e.target.blur();}if(e.key==='Enter'&&!results.classList.contains('hidden')&&lastSearchResults.length>0){const first=lastSearchResults.find(r=>r.type!=='section');if(first){if(first.type==='local'){handleSearchResult('local',first.id);}else{handleSearchResult('place',first.lat,first.lon,first.title);}}}});
document.addEventListener('DOMContentLoaded',initMap);
</script>
</body>
</html>
